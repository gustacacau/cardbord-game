<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG Mesa Caótico - Cafezinho Edition</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --panel: #121216;
    --border: #2d2d38;
    --border-focus: #3b82f6;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --red: #ef4444;
    --green: #10b981;
    --yellow: #f59e0b;
    --cyan: #06b6d4;
    --magenta: #d946ef;
    --blue: #3b82f6;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  #app {
    width: 100%;
    max-width: 780px;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  h1 {
    font-family: 'Press Start 2P', cursive;
    text-align: center;
    color: var(--cyan);
    font-size: 14px;
    line-height: 1.6;
    letter-spacing: 1px;
    border-bottom: 2px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 20px;
    text-shadow: 0 0 8px rgba(6, 182, 212, 0.3);
  }

  /* HUD Estilizado */
  #hud {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .hud-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 8px;
    text-align: center;
    font-size: 12px;
  }

  .hud-card span {
    display: block;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .hud-card b {
    font-size: 13px;
  }

  #hp { color: var(--red); }
  #force { color: var(--yellow); }
  #def { color: var(--blue); }
  #standHud { color: var(--magenta); font-size: 11px; }

  /* Log */
  #log {
    background: #050507;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    height: 340px;
    overflow-y: auto;
    font-size: 13.5px;
    line-height: 1.6;
    scroll-behavior: smooth;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
  }

  #log div {
    margin-bottom: 6px;
    border-left: 2px solid transparent;
    padding-left: 8px;
  }

  #log .red { color: var(--red); border-left-color: var(--red); }
  #log .green { color: var(--green); border-left-color: var(--green); }
  #log .yellow { color: var(--yellow); border-left-color: var(--yellow); }
  #log .cyan { color: var(--cyan); border-left-color: var(--cyan); }
  #log .magenta { color: var(--magenta); border-left-color: var(--magenta); }
  #log .blue { color: var(--blue); border-left-color: var(--blue); }
  #log .dim { color: var(--text-dim); }

  /* Dice Box */
  #diceFlash {
    text-align: center;
    color: var(--yellow);
    font-size: 13px;
    font-weight: bold;
    margin: 12px 0;
    min-height: 20px;
    letter-spacing: 1px;
  }

  /* Menus e Botões */
  #menu {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 10px;
  }

  button {
    background: #181820;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-weight: bold;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12.5px;
    text-align: left;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  button:hover:not(:disabled) {
    background: #22222e;
    border-color: var(--cyan);
    color: #fff;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(6, 182, 212, 0.15);
  }

  button:active:not(:disabled) {
    transform: translateY(1px);
  }

  button:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }

  /* Form Inicial */
  #nameForm {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 10px;
  }

  #nameForm input {
    background: #08080a;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 14px;
    border-radius: 8px;
    outline: none;
  }

  #nameForm button {
    background: var(--cyan);
    color: #000;
    justify-content: center;
    font-size: 14px;
    border: none;
  }

  #restartWrap {
    text-align: center;
    margin-top: 16px;
  }

  #restartWrap button {
    background: var(--red);
    border: none;
    color: #fff;
    font-size: 14px;
    padding: 12px 28px;
    margin: 0 auto;
    display: none;
    justify-content: center;
  }
</style>
</head>
<body>
<div id="app">
  <h1>⚔ RPG 2,50 - CAFEZINHO ⚔</h1>
  
  <div id="hud">
    <div class="hud-card">
      <span>❤ Vida</span>
      <b id="hp">-</b>
    </div>
    <div class="hud-card">
      <span>💪 Força</span>
      <b id="force">-</b>
    </div>
    <div class="hud-card">
      <span>🛡 Defesa</span>
      <b id="def">-</b>
    </div>
    <div class="hud-card">
      <span>✨ Stand</span>
      <b id="standHud">-</b>
    </div>
  </div>

  <div id="log"></div>
  <div id="diceFlash"></div>

  <!-- Form Inicial -->
  <div id="nameForm">
    <input id="nameInput" placeholder="Como o mestre deve te chamar de fracassado?..." maxlength="24" autofocus>
    <button onclick="iniciarJogo()">🚪 Entrar no Calabouço</button>
  </div>

  <!-- Menu de Ações -->
  <div id="menu" style="display:none;"></div>

  <!-- Botão de Ressuscitar -->
  <div id="restartWrap">
    <button id="restartBtn" onclick="location.reload()">💀 Aceitar a Derrota & Recomeçar</button>
  </div>
</div>

<script>
// ===================== DADOS DO CAOS =====================
const Bosses = [
  "Agiota Necromante", "Palhaço do INSS", "Idosa Armada", "CEO da Ubisoft",
  "Satanás do LinkedIn", "Mago Davi Jones", "CLT de 6 Dias", "Anjo do Bolsa Família",
  "Monge da Receita Federal", "Fiscal de Trânsito do Inferno", "Pose do Rodo"
];

// Ataques específicos e temáticos para cada tipo de Stand!
const standsDefinicoes = {
  "Stand: Veridis Quo": {
    soco: "👊 Acorde de Sintetizador",
    chute: "🦶 Chute Lo-Fi",
    especial: "🔮 Sinfonia Espacial do Ócio",
    descEspecial: "Causa dano místico massivo baseado na sua defesa"
  },
  "Stand: Around the World": {
    soco: "👊 Gancho Repetitivo",
    chute: "🦶 Giro de Vinil",
    especial: "🔮 Loop Temporal de 12 segundos",
    descEspecial: "Causa dano médio e recupera 30 HP"
  },
  "Stand: Iron Pope": {
    soco: "👊 Punho do Vaticano",
    chute: "🦶 Cruzada de Canela",
    especial: "🔮 Julgamento de Ferro",
    descEspecial: "Causa dano alto e aumenta sua defesa em +5 permanentemente nesta batalha"
  },
  "Stand: Rap Snitch Kniches": {
    soco: "👊 Rima Incriminatória",
    chute: "🦶 Pisada do MF DOOM",
    especial: "🔮 Dedada do Destino",
    descEspecial: "Ignora completamente a armadura do Boss e causa dano crítico"
  },
  "Stand: Echoes of Doom": {
    soco: "👊 Eco Distorcido",
    chute: "🦶 Chute Subgrave",
    especial: "🔮 Grito do Desemprego Existencial",
    descEspecial: "Deixa o Boss surdo com impostos, causando dano massivo"
  },
  "Stand: No Surprises": {
    soco: "👊 Soco Monótono",
    chute: "🦶 Bicuda Melancólica",
    especial: "🔮 Climax de Alarme Silencioso",
    descEspecial: "Causa dano destrutivo, mas te custa 10 de HP"
  },
  "Stand: Forever Diamonds": {
    soco: "👊 Lapidação Rápida",
    chute: "🦶 Calcanhar Cintilante",
    especial: "🔮 Brilho Ofuscante da Riqueza",
    descEspecial: "Causa dano alto e cega o Boss (ele errará o próximo turno)"
  },
  "Stand: New Slave": {
    soco: "👊 Revolta Proletária",
    chute: "🦶 Boadora Sem Crachá",
    especial: "🔮 Quebra das Correntes da CLT",
    descEspecial: "Causa o dobro da sua força como dano puro"
  }
};

const poderesJojo = Object.keys(standsDefinicoes);

const itensEfeitos = {
  "Panela Australium": { descricao: "Recupera 40 HP e dá +2 Defesa", usar: () => { jogador.hp = Math.min(jogador.hp + 40, jogador.hpMax); jogador.defesa += 2; } },
  "Chapéu Estranhamente Assustador": { descricao: "Dá +8 de Força e -5 de HP", usar: () => { jogador.forca += 8; jogador.hp -= 5; } },
  "Máscara do Caos": { descricao: "Troca sua defesa por força", usar: () => { const temp = jogador.defesa; jogador.defesa = 2; jogador.forca += temp + 5; } },
  "Bota do Scout Radioativo": { descricao: "Recupera 20 de HP", usar: () => { jogador.hp = Math.min(jogador.hp + 20, jogador.hpMax); } },
  "Óculos do Sofrimento": { descricao: "Dá +5 de Defesa permanente", usar: () => { jogador.defesa += 5; } },
  "Katana de Papelão": { descricao: "Força +12, mas perde -10 HP", usar: () => { jogador.forca += 12; jogador.hp -= 10; } },
  "Cabeça de Rato": { descricao: "Te deixa imundo. +15 HP", usar: () => { jogador.hp = Math.min(jogador.hp + 15, jogador.hpMax); } }
};

const itensTF2 = Object.keys(itensEfeitos);

const eventosAleatorios = [
  "Um mendigo sábio te desafia num duelo de rima valendo um pastel.",
  "Você pisa num LEGO ancestral perdido no escuro e quase se junta ao Criador.",
  "O mestre do jogo esqueceu as regras e inventou uma taxa sobre o seu oxigênio.",
  "Uma porta de madeira suspeita do 'Chaves' aparece no meio do nada.",
  "Um vendedor calvo tenta te empurrar uma NFT de capivara de terno.",
  "Seu personagem começa a refletir sobre boletos atrasados e chora no cantinho.",
  "Uma flauta doce tocando o tema do Titanic desafinada ecoa ao fundo.",
  "Um goblin de óculos escuros e juliet começa a cantar Linkin Park de rave.",
  "O clima muda misteriosamente e começa a chover Dolly Guaraná.",
  "Você encontra um porquinho-da-índia fumando charuto. Ele some no vento."
];

const finaisAbsurdos = [
  "Você tropeça no próprio ego e desmaia de vergonha no meio da rua.",
  "O chão some e você cai num limbo de telemarketing que nunca desliga.",
  "O mestre cansou de narrar e você simplesmente deixa de existir na planilha.",
  "A porta se abre e você cai direto numa reunião de alinhamento de metas da firma.",
  "O vendedor calvo te convence a botar sua herança no 'Jogo da Capivara'. Perdeu tudo.",
  "A dor existencial foi demais. Você desistiu de ser herói e abriu um MEI de bolo de pote.",
  "A ocarina toca 'Evidências' ao contrário e sua mente colapsa.",
  "O goblin te sequestra e te força a trabalhar numa escala de 14 horas sem almoço.",
  "Um raio cai exatamente na sua cabeça (azar absoluto e divino).",
  "O mestre joga uma pilha de boletos na sua mesa. Seu personagem infarta de susto."
];

// ===================== ESTADO DO JOGO =====================
const rng = {
  next(min, max) { return Math.floor(Math.random() * (max - min)) + min; }
};

let jogador = {
  nome: "", 
  hp: 100, 
  hpMax: 150, 
  forca: 0, 
  defesa: 0, 
  stand: "",
  standLvl: 1,
  standXp: 0,
  inventario: []
};

let emBossFight = false;
let bossState = null;
let bossCego = false;

const logEl = document.getElementById('log');
const menuEl = document.getElementById('menu');
const diceEl = document.getElementById('diceFlash');

// ===================== FUNÇÕES AUXILIARES DE UI =====================
function log(msg, cls) {
  const span = document.createElement('div');
  if (cls) span.className = cls;
  span.textContent = msg;
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

function logBlank() {
  log("", "dim");
}

function atualizarHUD() {
  document.getElementById('hp').textContent = Math.max(0, jogador.hp);
  document.getElementById('force').textContent = jogador.forca;
  document.getElementById('def').textContent = jogador.defesa;
  
  let standStatus = "Nenhum";
  if (jogador.stand) {
    standStatus = `${jogador.stand.replace("Stand: ", "")} (Lvl ${jogador.standLvl})`;
  }
  document.getElementById('standHud').textContent = standStatus;
}

async function rolarD20() {
  diceEl.textContent = "🎲 Rolando dados da desgraça...";
  await new Promise(r => setTimeout(r, 400));
  const valor = rng.next(1, 21);
  diceEl.textContent = `🎲 Você rolou um [ D20 = ${valor} ]!`;
  log(`[D20]: Rolou ${valor}`, valor >= 12 ? 'green' : 'red');
  return valor;
}

function checarMorte() {
  atualizarHUD();
  if (jogador.hp <= 0) {
    logBlank();
    log("💀 SEU PERSONAGEM MORREU.", 'red');
    log("O mestre solta uma risada maligna e anota mais uma baixa.", 'red');
    menuEl.style.display = 'none';
    document.getElementById('restartBtn').style.display = 'block';
    return true;
  }
  return false;
}

// ===================== EVENTOS DE INÍCIO =====================
function iniciarJogo() {
  const nome = document.getElementById('nameInput').value.trim();
  jogador.nome = nome || "Fracassado Anônimo";
  jogador.hp = 100;
  jogador.forca = rng.next(8, 15);
  jogador.defesa = rng.next(3, 10);

  document.getElementById('nameForm').style.display = 'none';

  log("===================================================", 'cyan');
  log("   🎮 RPG 2,50 - CAFEZINHO EDITION INICIADO", 'cyan');
  log("===================================================", 'cyan');
  logBlank();
  log("O mestre analisa sua ficha com desprezo...", 'dim');
  log(`"${jogador.nome}? Que nome horroroso para um herói."`, 'yellow');
  logBlank();

  atualizarHUD();
  menuEl.style.display = 'grid';
  renderMenuPrincipal();
}

// ===================== MENUS =====================
function renderMenuPrincipal() {
  emBossFight = false;
  menuEl.innerHTML = `
    <button onclick="explorar()">🧭 1 - Explorar Mato</button>
    <button onclick="mostrarInventario()">🎒 2 - Abrir Mochila</button>
    <button onclick="ocarina()">🎶 3 - Tocar Ocarina</button>
    <button onclick="descansar()">💤 4 - Cochilar</button>
    <button onclick="cozinhar()">🍳 5 - Cozinhar Miojo</button>
    <button onclick="assistirAnime()">📺 6 - Assistir Anime x2</button>
    <button onclick="suicidio()">🏳 7 - Desistir da Vida</button>
    <button onclick="salvarJogo()">💾 8 - Salvar Jogo</button>
  `;
}

function renderMenuBoss() {
  menuEl.innerHTML = `
    <button onclick="bossAcao('atacar')">⚔ 1 - Descer o Sarrafo</button>
    <button onclick="bossAcao('defender')">🛡 2 - Se Encolher</button>
    <button onclick="bossAcao('chantagem')">📱 3 - Chantagem do Zap</button>
    <button onclick="abrirMenuStand()" ${!jogador.stand ? 'disabled' : ''}>✨ 4 - Usar Stand</button>
    <button onclick="bossAcao('item')">🎒 5 - Usar Item</button>
    <button onclick="bossAcao('conversar')">💬 6 - Tentar Dialogar</button>
  `;
}

function abrirMenuStand() {
  if (!jogador.stand) return;

  const standInfo = standsDefinicoes[jogador.stand];
  menuEl.innerHTML = "";

  // Soco Personalizado (Sempre liberado)
  const btnSoco = document.createElement('button');
  btnSoco.textContent = `${standInfo.soco} (Lvl 1)`;
  btnSoco.onclick = () => usarHabilidadeStand('soco');
  menuEl.appendChild(btnSoco);

  // Chute Personalizado (Liberado Lvl 2+)
  const btnChute = document.createElement('button');
  if (jogador.standLvl >= 2) {
    btnChute.textContent = `${standInfo.chute} (Lvl 2)`;
    btnChute.onclick = () => usarHabilidadeStand('chute');
  } else {
    btnChute.textContent = `🔒 Chute de Impacto (Requer Lvl 2)`;
    btnChute.disabled = true;
  }
  menuEl.appendChild(btnChute);

  // Especial Personalizado (Liberado Lvl 3)
  const btnEspecial = document.createElement('button');
  if (jogador.standLvl >= 3) {
    btnEspecial.textContent = `${standInfo.especial} (Lvl 3)`;
    btnEspecial.onclick = () => usarHabilidadeStand('especial');
  } else {
    btnEspecial.textContent = `🔒 Habilidade Especial (Requer Lvl 3)`;
    btnEspecial.disabled = true;
  }
  menuEl.appendChild(btnEspecial);

  const btnVoltar = document.createElement('button');
  btnVoltar.textContent = "⬅ Voltar";
  btnVoltar.style.borderColor = "var(--red)";
  btnVoltar.onclick = renderMenuBoss;
  menuEl.appendChild(btnVoltar);
}

// ===================== SISTEMA DE SALVAR =====================
function salvarJogo() {
  window.__saveSlot = JSON.stringify(jogador);
  logBlank();
  log("💾 [Sistema]: Jogo salvo nos servidores movidos a batata.", 'green');
}

function carregarJogo() {
  if (window.__saveSlot) {
    jogador = JSON.parse(window.__saveSlot);
    log("📂 [Sistema]: Carregado com sucesso de onde você parou.", 'cyan');
    atualizarHUD();
  } else {
    log("❌ Nenhum dado de save encontrado nesta sessão temporária.", 'dim');
  }
}

// ===================== AÇÕES CULTURA POP / COISAS ENGRAÇADAS =====================
async function assistirAnime() {
  logBlank();
  log("📺 Você senta em cima de uma pedra e abre o celular para ver anime na velocidade 2x...", 'cyan');
  const dado = await rolarD20();
  
  if (dado >= 12) {
    const cura = rng.next(15, 30);
    jogador.hp = Math.min(jogador.hp + cura, jogador.hpMax);
    jogador.forca += 2;
    log(`✨ MOTIVAÇÃO SHONEN! O poder da amizade aumentou seu foco. Você curou ${cura} de HP e ganhou +2 de Força!`, 'green');
  } else {
    const dano = rng.next(10, 20);
    jogador.hp -= dano;
    log(`😵 AVC MENTAL! O ritmo acelerado derreteu seus neurônios. Você tomou ${dano} de dano cerebral.`, 'red');
  }
  checarMorte();
}

// ===================== AÇÕES DE EXPLORAÇÃO =====================
async function explorar() {
  log("Você caminha sem rumo no meio do nada...", 'dim');
  const chance = rng.next(1, 101);
  if (chance <= 40) {
    await eventoAleatorio();
  } else if (chance <= 75) {
    encontrarItem();
  } else {
    iniciarBossFight();
  }
  checarMorte();
}

async function eventoAleatorio() {
  const evento = eventosAleatorios[rng.next(0, eventosAleatorios.length)];
  log(evento, 'yellow');
  const dado = await rolarD20();
  if (dado >= 12) {
    log("Você conseguiu se esquivar do pior por pura sorte.");
  } else {
    const dano = rng.next(10, 25);
    jogador.hp -= dano;
    log(`Que azar! Você tomou ${dano} de dano físico e mental.`, 'red');
  }
}

function encontrarItem() {
  const item = itensTF2[rng.next(0, itensTF2.length)];
  log(`✨ Você achou caído no chão: ${item}!`, 'green');
  jogador.inventario.push(item);

  // Flecha do Stand
  if (rng.next(1, 4) === 1) {
    const novoStand = poderesJojo[rng.next(0, poderesJojo.length)];
    logBlank();
    log("💘 Uma flecha misteriosa com ponta de ouro te espetou!", 'magenta');
    
    if (jogador.stand === novoStand) {
      log("A flecha ressoou com seu Stand atual! Ele ganhou +1 Nível!", 'green');
      evoluirStand(1);
    } else {
      jogador.stand = novoStand;
      jogador.standLvl = 1;
      jogador.standXp = 0;
      log(`Seu Stand despertou: ${jogador.stand}`, 'magenta');
      log("Derrote chefes para evoluir os ataques personalizados dele!", 'cyan');
    }
  }
}

function evoluirStand(niveis = 1) {
  jogador.standLvl += niveis;
  log(`🌟 SEU STAND EVOLUIU PARA O NÍVEL ${jogador.standLvl}!`, 'green');
  const standInfo = standsDefinicoes[jogador.stand];
  if (jogador.standLvl === 2) {
    log(`🔓 ATAQUE DEBLOQUEADO: [ ${standInfo.chute} ]!`, 'cyan');
  } else if (jogador.standLvl >= 3) {
    log(`🔓 SUPREMO DEBLOQUEADO: [ ${standInfo.especial} ]!`, 'cyan');
  }
  atualizarHUD();
}

// ===================== COMBATES DE BOSS =====================
function iniciarBossFight() {
  const boss = Bosses[rng.next(0, Bosses.length)];
  bossState = {
    nome: boss,
    hp: rng.next(80, 160),
    atk: rng.next(12, 22)
  };
  emBossFight = true;
  bossCego = false;

  logBlank();
  log(`🚨 UM INIMIGO SELVAGEM APARECEU: ${boss.toUpperCase()}!`, 'red');
  renderMenuBoss();
}

async function usarHabilidadeStand(tipo) {
  if (!emBossFight || !bossState) return;

  const standInfo = standsDefinicoes[jogador.stand];
  logBlank();
  log(`Você comanda seu [ ${jogador.stand} ]!`, 'magenta');
  const dado = await rolarD20();

  if (dado < 7) {
    log("Seu Stand ficou confuso e errou o golpe!", 'red');
    prosseguirTurnoLuta();
    return;
  }

  let dano = 0;

  if (tipo === 'soco') {
    dano = jogador.forca + rng.next(8, 16);
    log(`💥 ${standInfo.soco.toUpperCase()}! Você causou ${dano} de dano!`, 'green');
    bossState.hp -= dano;
  } 
  else if (tipo === 'chute' && jogador.standLvl >= 2) {
    dano = jogador.forca + rng.next(15, 25);
    log(`💥 ${standInfo.chute.toUpperCase()}! Conectou em cheio causando ${dano} de dano!`, 'green');
    bossState.hp -= dano;
  } 
  else if (tipo === 'especial' && jogador.standLvl >= 3) {
    log(`🔮 ${standInfo.especial.toUpperCase()}!`, 'magenta');
    log(`Efeito: ${standInfo.descEspecial}`, 'dim');

    switch(jogador.stand) {
      case "Stand: Veridis Quo":
        dano = 30 + (jogador.defesa * 2);
        break;
      case "Stand: Around the World":
        dano = 35;
        jogador.hp = Math.min(jogador.hp + 30, jogador.hpMax);
        log("⏱ O tempo voltou um pouco e você se regenerou!", 'green');
        break;
      case "Stand: Iron Pope":
        dano = 45;
        jogador.defesa += 5;
        log("🛡 Blindagem espiritual aumentada em +5 de Defesa permanente!", 'blue');
        break;
      case "Stand: Rap Snitch Kniches":
        dano = 65;
        break;
      case "Stand: Echoes of Doom":
        dano = 55;
        break;
      case "Stand: No Surprises":
        dano = 70;
        jogador.hp -= 10;
        log("💥 O rebote quebrou seus dentes! Você tomou 10 de dano.", 'red');
        break;
      case "Stand: Forever Diamonds":
        dano = 30;
        bossCego = true;
        log(`✨ O inimigo ficou totalmente cego e vai errar o próximo ataque!`, 'yellow');
        break;
      case "Stand: New Slave":
        dano = jogador.forca * 2;
        break;
    }

    log(`💥 Dano Místico causado: ${dano}!`, 'green');
    bossState.hp -= dano;
  }

  prosseguirTurnoLuta();
}

async function bossAcao(acao) {
  if (!emBossFight || !bossState) return;

  switch (acao) {
    case 'atacar': {
      const dadoAtk = await rolarD20();
      if (dadoAtk >= 11) {
        const dano = jogador.forca + rng.next(6, 18);
        log(`💥 GOLPE CERTEIRO! Você causou ${dano} de dano no ${bossState.nome}.`, 'green');
        bossState.hp -= dano;
      } else {
        log("❌ Você errou o soco!");
      }
      break;
    }
    case 'defender':
      log("🛡 Você se encolhe na tentativa de reduzir danos. Defesa aumentada provisoriamente.");
      jogador.defesa += 3;
      break;
    case 'chantagem': {
      logBlank();
      log(`📱 Você abre o WhatsApp e ameaça vazar as figurinhas comprometedoras do ${bossState.nome}...`, 'cyan');
      const dadoChantagem = await rolarD20();
      if (dadoChantagem >= 12) {
        const debuff = rng.next(4, 10);
        bossState.atk = Math.max(2, bossState.atk - debuff);
        log(`🤫 Sucesso! O ${bossState.nome} ficou em pânico e seu ataque caiu em -${debuff}!`, 'green');
      } else {
        const danoZap = rng.next(5, 15);
        jogador.hp -= danoZap;
        log(`🤬 A assessoria de imprensa do ${bossState.nome} te cancelou na internet! Você tomou ${danoZap} de dano mental.`, 'red');
      }
      break;
    }
    case 'fugir': {
      const fuga = await rolarD20();
      if (fuga >= 16) {
        log("💨 Você correu chorando, mas escapou do perigo!", 'cyan');
        escaparDaLuta();
        return;
      } else {
        log(`O ${bossState.nome} barrou sua fuga e riu.`);
      }
      break;
    }
    case 'item':
      mostrarInventario();
      return; 
    case 'conversar':
      await conversarComNPC();
      return; // O fluxo de conversa chama prosseguirTurnoLuta() internamente ou finaliza a luta se fugir assobiando.
  }

  prosseguirTurnoLuta();
}

function escaparDaLuta() {
  emBossFight = false;
  bossState = null;
  atualizarHUD();
  renderMenuPrincipal();
}

// Controla os turnos, contra-ataques e finalização de combate
function prosseguirTurnoLuta() {
  if (bossState && bossState.hp > 0) {
    logBlank();
    log(`Turno do inimigo: ${bossState.nome} está agindo...`, 'dim');
    
    if (bossCego) {
      log(`🍃 O ${bossState.nome} bateu a cabeça na parede porque ainda está cego!`, 'yellow');
      bossCego = false;
    } else {
      const bossRoll = rng.next(1, 21);
      if (bossRoll >= 10) {
        let danoBoss = bossState.atk - jogador.defesa;
        if (danoBoss < 2) danoBoss = 2;
        jogador.hp -= danoBoss;
        log(`🥊 ${bossState.nome} te atacou causando ${danoBoss} de dano!`, 'red');
      } else {
        log(`🍃 O ${bossState.nome} tentou te bater mas errou feio.`);
      }
    }
  }

  atualizarHUD();

  if (checarMorte()) return;

  // Vitória
  if (bossState && bossState.hp <= 0) {
    logBlank();
    log(`🎉 VITÓRIA! Você derrotou ${bossState.nome}!`, 'green');
    
    if (jogador.stand) {
      jogador.standXp += 1;
      log(`✨ Stand +1 XP de Batalha (XP Atual: ${jogador.standXp}/3)`, 'magenta');
      if (jogador.standXp === 1 && jogador.standLvl < 2) {
        evoluirStand(1);
      } else if (jogador.standXp === 3 && jogador.standLvl < 3) {
        evoluirStand(1);
      }
    }

    const recompensa = rng.next(20, 50);
    jogador.hp = Math.min(jogador.hp + recompensa, jogador.hpMax);
    log(`Você pilhou os bolsos do derrotado e recuperou +${recompensa} HP.`);
    
    escaparDaLuta();
    return;
  }

  if (emBossFight) {
    logBlank();
    log(`Status da Luta: [ Boss: ${bossState.hp} HP ] | [ Você: ${jogador.hp} HP ]`, 'dim');
    renderMenuBoss();
  }
}

// ===================== INVENTÁRIO COM USO DE ITENS =====================
function mostrarInventario() {
  logBlank();
  log("🎒 ===== SEU INVENTÁRIO =====", 'cyan');
  if (jogador.inventario.length === 0) {
    log("Sua mochila está vazia.");
    if (emBossFight) renderMenuBoss();
    else renderMenuPrincipal();
    return;
  }

  menuEl.innerHTML = "";
  jogador.inventario.forEach((it, idx) => {
    const info = itensEfeitos[it] || { descricao: "Efeito desconhecido" };
    log(`[${idx + 1}] ${it} - (${info.descricao})`, 'yellow');
    
    const btn = document.createElement('button');
    btn.textContent = `Usar: ${it}`;
    btn.onclick = () => usarItemDaMochila(idx);
    menuEl.appendChild(btn);
  });

  const voltarBtn = document.createElement('button');
  voltarBtn.textContent = "⬅ Voltar";
  voltarBtn.style.borderColor = "var(--red)";
  voltarBtn.onclick = () => {
    if (emBossFight) renderMenuBoss();
    else renderMenuPrincipal();
  };
  menuEl.appendChild(voltarBtn);
}

function usarItemDaMochila(index) {
  const item = jogador.inventario[index];
  if (itensEfeitos[item]) {
    itensEfeitos[item].usar();
    log(`Você usou/ativou: ${item}!`, 'green');
    jogador.inventario.splice(index, 1);
  }
  
  atualizarHUD();
  checarMorte();

  if (jogador.hp > 0) {
    if (emBossFight) renderMenuBoss();
    else renderMenuPrincipal();
  }
}

// ===================== OUTRAS OPÇÕES DO MENU =====================
async function ocarina() {
  log("🎶 Você sopra a ocarina desafinada...", 'cyan');
  const efeito = rng.next(1, 7);
  await new Promise(r => setTimeout(r, 400));
  
  switch(efeito) {
    case 1:
      log("⏱ O tempo acelerou e você se sentiu ágil. Força +3!");
      jogador.forca += 3;
      break;
    case 2:
      log("🌧 Choveu ácido. HP -12.", 'red');
      jogador.hp -= 12;
      break;
    case 3:
      log("🌕 A lua ficou vermelha e você ganhou casca grossa. Defesa +4!", 'blue');
      jogador.defesa += 4;
      break;
    case 4:
      log("💥 O mestre mudou o sistema de regras na maldade. Atributos reduzidos!", 'red');
      jogador.forca = Math.max(1, jogador.forca - 5);
      jogador.defesa = Math.max(0, jogador.defesa - 3);
      break;
    case 5:
      log("Você cuspiu saliva dentro do instrumento e nada aconteceu.");
      break;
    case 6:
      log("🎵 Você tocou a canção do tempo e recuperou um pouco de vida!", 'green');
      jogador.hp = Math.min(jogador.hp + 25, jogador.hpMax);
      break;
  }
  checarMorte();
}

async function descansar() {
  log("💤 Você deita no chão frio para tentar tirar um cochilo...", 'dim');
  const dado = await rolarD20();
  if (dado >= 13) {
    const cura = rng.next(20, 40);
    jogador.hp = Math.min(jogador.hp + cura, jogador.hpMax);
    log(`😴 Sono revigorante! Você acordou com +${cura} de HP.`, 'green');
  } else {
    const dano = rng.next(12, 28);
    jogador.hp -= dano;
    log(`💥 PÉSSIMA IDÉIA! Um bicho mordeu sua orelha enquanto dormia. Você perdeu ${dano} HP.`, 'red');
  }
  checarMorte();
}

async function cozinhar() {
  log("🍳 Você tenta fazer um miojo improvisado...", 'dim');
  const dado = await rolarD20();
  if (dado >= 11) {
    const bonus = rng.next(6, 18);
    jogador.forca += bonus;
    log(`🍜 Ficou com gosto de sabão, mas te deu energia! Força +${bonus}!`, 'green');
  } else {
    const dano = rng.next(10, 22);
    jogador.hp -= dano;
    log(`🤮 Infecção alimentar grave! Você passou mal e perdeu ${dano} HP.`, 'red');
  }
  checarMorte();
}

function suicidio() {
  const frase = finaisAbsurdos[rng.next(0, finaisAbsurdos.length)];
  logBlank();
  log(`🏳 DESISTÊNCIA: ${frase}`, 'red');
  jogador.hp = 0;
  checarMorte();
}

async function conversarComNPC() {
  const falas = [
    "Um velho desabafa sobre taxas de corretagem de NFT.",
    "Um duende verde quer saber se você quer comprar cripto de pote.",
    "Um guerreiro de armadura chora no canto porque a aposentadoria não sai.",
    "O boss pergunta se você apoia a taxação de compras internacionais."
  ];
  logBlank();
  log(`🗣 Diálogo: ${falas[rng.next(0, falas.length)]}`, 'cyan');
  
  const opcoes = ["Ser educado", "Bater no peito", "Gritar e mentir", "Fingir demência"];
  const escolha = rng.next(0, opcoes.length);
  log(`Sua reação instintiva foi: ${opcoes[escolha]}`, 'dim');
  
  const dado = await rolarD20();
  if (dado >= 14) {
    switch (escolha) {
      case 0:
        log("O NPC achou você fofo e te deu um beijinho na testa. HP +10.", 'green');
        jogador.hp = Math.min(jogador.hp + 10, jogador.hpMax);
        prosseguirTurnoLuta();
        break;
      case 1:
        log("Sua marra funcionou. O NPC se assustou e sua força subiu em +5!", 'green');
        jogador.forca += 5;
        prosseguirTurnoLuta();
        break;
      case 2:
        log("A mentira colou perfeitamente. Você se sente mais seguro. Defesa +3!", 'green');
        jogador.defesa += 3;
        prosseguirTurnoLuta();
        break;
      case 3:
        log("Você saiu andando assobiando e deu tudo certo.", 'green');
        log("🚶‍♂️ O inimigo ficou tão confuso com o seu desinteresse que desistiu de brigar!", 'cyan');
        escaparDaLuta(); // FIM DE LUTA DIRETO!
        break;
    }
  } else {
    const dano = rng.next(8, 20);
    log(`❌ Que desastre de conversa! O clima ficou péssimo. Você perdeu ${dano} de moral.`, 'red');
    jogador.hp -= dano;
    prosseguirTurnoLuta();
  }
}
